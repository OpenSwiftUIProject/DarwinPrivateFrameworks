name: AGExample

on:
  push:
    branches: [main]
    paths:
      - 'AG/**'
      - 'Example/AGExample/**'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/.mise.toml'
      - 'Package.swift'
      - '.github/actions/build-example/**'
      - '.github/workflows/ag_example.yml'
  pull_request:
    branches: [main]
    paths:
      - 'AG/**'
      - 'Example/AGExample/**'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/.mise.toml'
      - 'Package.swift'
      - '.github/actions/build-example/**'
      - '.github/workflows/ag_example.yml'

jobs:
  build:
    name: Build AGExample (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: "generic/platform=iOS"
          - platform: iOS Simulator
            destination: "generic/platform=iOS Simulator"
          - platform: macOS
            destination: "platform=macOS"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-example
        with:
          scheme: AGExample
          destination: ${{ matrix.destination }}
          xcode-version: "16.4"
