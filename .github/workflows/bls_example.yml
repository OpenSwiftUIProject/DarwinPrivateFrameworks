name: BLSExample

on:
  push:
    branches: [main]
    paths:
      - 'BLS/**'
      - 'Example/BLSExample/**'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/.mise.toml'
      - 'Package.swift'
      - '.github/actions/build-example/**'
      - '.github/workflows/bls_example.yml'
  pull_request:
    branches: [main]
    paths:
      - 'BLS/**'
      - 'Example/BLSExample/**'
      - 'Example/Project.swift'
      - 'Example/Tuist.swift'
      - 'Example/Tuist/**'
      - 'Example/.mise.toml'
      - 'Package.swift'
      - '.github/actions/build-example/**'
      - '.github/workflows/bls_example.yml'

jobs:
  build:
    name: Build BLSExample (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: "generic/platform=iOS"
          - platform: iOS Simulator
            destination: "generic/platform=iOS Simulator"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-example
        with:
          scheme: BLSExample
          destination: ${{ matrix.destination }}
          xcode-version: "16.4"
